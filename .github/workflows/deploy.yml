name: Deploy web

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.44.6"   # ← pon AQUÍ tu versión exacta del paso 1
          cache: true

      - name: Build web
        run: flutter build web --release

      - name: Write service account key
        run: echo "$FIREBASE_SA_KEY" > "$RUNNER_TEMP/sa.json"
        env:
          FIREBASE_SA_KEY: ${{ secrets.FIREBASE_SA_KEY }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project vitala-demo --non-interactive
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
